<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>出張修理くん</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="top-nav">
    <button id="btn-back" class="nav-btn hidden" type="button" onclick="goBack()">&#8592;</button>
    <h1 id="page-title">出張修理くん</h1>
    <button id="btn-customers" class="nav-btn" type="button" onclick="showCustomers()">&#128101;</button>
  </nav>

  <main>
    <section id="screen-calendar" class="screen active">
      <div class="month-nav">
        <button id="prev-month" class="month-btn" type="button" onclick="prevMonth()">&#8249;</button>
        <h2 id="month-label"></h2>
        <button id="next-month" class="month-btn" type="button" onclick="nextMonth()">&#8250;</button>
      </div>

      <div id="cal-grid" class="cal-grid"></div>
    </section>

    <section id="screen-day" class="screen">
      <h2 id="day-title" class="day-header"></h2>
      <div id="visit-list"></div>
      <button class="fab" type="button" onclick="showAddForm()">+</button>
      <div style="height:100px;"></div>
    </section>

    <section id="screen-form" class="screen">
      <div class="form-section">
        <h3>出張先・GPS</h3>

        <label class="field-label" for="f-company">相手先会社名</label>
        <input type="text" id="f-company" placeholder="例：〇〇運送">

        <label class="field-label" for="f-person">担当者名</label>
        <input type="text" id="f-person" placeholder="例：佐藤さん">

        <label class="field-label" for="f-phone">電話番号</label>
        <input type="tel" id="f-phone" placeholder="例：090-0000-0000">

        <label class="field-label" for="f-address">住所</label>
        <input type="text" id="f-address" placeholder="例：福島県郡山市〇〇1-2-3">

        <div class="btn-row">
          <button class="btn btn-maps" type="button" onclick="openAddressMaps()">地図で開く</button>
          <button class="btn btn-gps" type="button" onclick="getGPS()">現在地取得</button>
        </div>

        <input type="text" id="f-gps" placeholder="GPS座標（自動取得）" readonly>
      </div>

      <div class="form-section">
        <h3>車両情報</h3>

        <label class="field-label" for="f-time">作業時刻</label>
        <input type="time" id="f-time">

        <label class="field-label" for="f-car">車名</label>
        <input type="text" id="f-car" placeholder="例：プリウス、ハイエース">

        <label class="field-label" for="f-staff">自社担当者</label>
        <input type="text" id="f-staff" placeholder="例：佐藤">

        <label class="field-label" for="f-distance">走行距離</label>
        <input type="number" id="f-distance" placeholder="例：85000">
      </div>

      <div class="form-section">
        <h3>修理内容</h3>

        <label class="check-label">
          <input type="checkbox" id="f-electric">
          電気まわり
        </label>

        <label class="check-label">
          <input type="checkbox" id="f-oil">
          オイル交換
        </label>

        <label class="field-label" for="f-oil-amount">オイル量</label>
        <input type="text" id="f-oil-amount" placeholder="例：4.5L">

        <label class="check-label">
          <input type="checkbox" id="f-oil-filter">
          オイルフィルター交換
        </label>

        <label class="check-label">
          <input type="checkbox" id="f-other">
          その他
        </label>
      </div>

      <div class="form-section">
        <h3>一言メモ・音声</h3>

        <label class="field-label" for="f-memo">文字メモ</label>
        <textarea id="f-memo" placeholder="修理内容・気づいたことを入力..."></textarea>

        <div class="btn-row">
          <button id="btn-record-start" class="btn btn-record" type="button" onclick="startVoiceRecording()">録音開始</button>
          <button id="btn-record-stop" class="btn btn-stop" type="button" onclick="stopVoiceRecording()" disabled>録音停止</button>
        </div>

        <button id="btn-record-clear" class="btn btn-clear" type="button" onclick="clearVoiceRecording()" disabled>
          録音を削除
        </button>

        <p id="record-status" class="note">録音すると、保存時にGoogleドライブへ音声ファイルとして送信されます。</p>
        <audio id="voice-preview" controls style="display:none;"></audio>
      </div>

      <div class="form-section">
        <h3>写真</h3>
        <label class="field-label" for="f-photo">写真を選択</label>
        <input id="f-photo" type="file" accept="image/*" capture="environment" onchange="handlePhotoSelect(event)">
        <p id="photo-status" class="note">選択した写真は自動で小さくしてからGoogleドライブへ送信します。</p>
        <img id="photo-preview" class="photo-preview" alt="選択した写真のプレビュー" style="display:none;">
        <button id="btn-photo-clear" class="btn btn-clear" type="button" onclick="clearPhoto()" disabled>
          写真を削除
        </button>
      </div>

      <button id="btn-save-visit" class="btn btn-save" type="button" onclick="saveVisit()">
        保存する
      </button>

      <button class="btn btn-delete-visit" id="btn-delete-visit" type="button" onclick="deleteCurrentVisit()" style="display:none;">
        この記録を削除
      </button>

      <div style="height:80px;"></div>
    </section>

    <section id="screen-customers" class="screen">
      <button class="btn btn-save" type="button" onclick="showAddCustomer()" style="margin-bottom:16px;">
        + お客様を追加
      </button>

      <div id="customer-list"></div>

      <div id="customer-form" style="display:none;">
        <div class="form-section customer-edit">
          <h3 id="customer-form-title">お客様を追加</h3>

          <label class="field-label" for="c-name">お客様名 ※必須</label>
          <input type="text" id="c-name" placeholder="例：山田太郎">

          <label class="field-label" for="c-address">住所</label>
          <input type="text" id="c-address" placeholder="例：福島県郡山市〇〇1-2-3">

          <label class="field-label" for="c-phone">電話番号</label>
          <input type="tel" id="c-phone" placeholder="例：024-000-0000">

          <label class="field-label" for="c-note">備考</label>
          <textarea id="c-note" placeholder="車種・注意点など..." class="small-textarea"></textarea>

          <div class="btn-row">
            <button class="btn btn-save" type="button" onclick="saveCustomer()" style="flex:1;">保存</button>
            <button class="btn btn-cancel" type="button" onclick="cancelCustomerForm()" style="flex:1;">キャンセル</button>
          </div>
        </div>
      </div>

      <div style="height:80px;"></div>
    </section>
  </main>

  <div id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
